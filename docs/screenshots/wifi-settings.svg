  <rect x="414" y="272" width="342" height="108" rx="8" fill="#ffffff" stroke="#dedede"/>
  <text x="440" y="310" fill="#202124" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18" font-weight="600">Private Wi-Fi Address</text>
  <text x="440" y="342" fill="#5f6368" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15">Review this per-network privacy setting.</text>
