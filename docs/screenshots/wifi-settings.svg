<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Wi-Fi settings guide screenshot</title>
  <desc id="desc">An illustrative macOS settings screen pointing to Details and Private Wi-Fi Address.</desc>
  <rect width="960" height="540" fill="#f7f4ee"/>
  <rect x="80" y="46" width="800" height="448" rx="8" fill="#fbfbfb" stroke="#d5d5d5"/>
  <rect x="80" y="46" width="220" height="448" rx="8" fill="#efefef"/>
  <text x="112" y="96" fill="#202124" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="28" font-weight="700">Settings</text>
  <rect x="102" y="148" width="176" height="38" rx="7" fill="#dfe8f7"/>
  <text x="132" y="173" fill="#202124" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="18">Wi-Fi</text>
  <text x="336" y="102" fill="#202124" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="32" font-weight="700">Wi-Fi</text>
  <rect x="336" y="138" width="496" height="86" rx="8" fill="#ffffff" stroke="#dedede"/>
  <text x="366" y="175" fill="#202124" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="22" font-weight="600">Coffee Shop Wi-Fi</text>
  <text x="366" y="203" fill="#5f6368" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="16">Connected</text>
  <rect x="728" y="160" width="76" height="34" rx="17" fill="#e8eef8" stroke="#bcc6d8"/>
  <text x="744" y="183" fill="#1f2937" font-family="-apple-system, BlinkMacSystemFont, sans-serif" font-size="15">Details</text>
