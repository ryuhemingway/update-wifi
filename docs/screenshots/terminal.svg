<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">Terminal usage screenshot</title>
  <desc id="desc">An illustrative terminal showing the update wifi command.</desc>
  <rect width="960" height="540" fill="#f6f3ed"/>
  <rect x="80" y="70" width="800" height="400" rx="8" fill="#171a1f"/>
  <rect x="80" y="70" width="800" height="38" rx="8" fill="#2a2f36"/>
  <circle cx="104" cy="89" r="6" fill="#ff5f57"/>
  <circle cx="124" cy="89" r="6" fill="#febc2e"/>
  <circle cx="144" cy="89" r="6" fill="#28c840"/>
  <text x="112" y="153" fill="#d8dee9" font-family="Menlo, monospace" font-size="22">$ update wifi</text>
  <text x="112" y="202" fill="#a7c080" font-family="Menlo, monospace" font-size="20">Opening Wi-Fi settings...</text>
  <text x="112" y="238" fill="#a7c080" font-family="Menlo, monospace" font-size="20">Refreshing Wi-Fi radio on en0...</text>
  <text x="112" y="300" fill="#d8dee9" font-family="Menlo, monospace" font-size="19">Next steps:</text>
  <text x="136" y="336" fill="#d8dee9" font-family="Menlo, monospace" font-size="19">1. Select your Wi-Fi network in System Settings.</text>
  <text x="136" y="370" fill="#d8dee9" font-family="Menlo, monospace" font-size="19">2. Open Details next to the network.</text>
  <text x="136" y="404" fill="#d8dee9" font-family="Menlo, monospace" font-size="19">3. Review Private Wi-Fi Address.</text>
</svg>
